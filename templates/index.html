<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* Input field */
#userInput{
    border:2px solid #3c2a7a;
    border-radius:25px;
    padding:10px 15px;
    width:260px;
    font-size:15px;
    outline:none;
}

/* Send button */
#sendBtn{
    border:none;
    border-radius:25px;
    font-size:16px;
    background:#45bc97;
    color:white;
    padding:10px 18px;
    margin-left:8px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

#sendBtn:hover{
    background:#2c786e;
    transform:scale(1.05);
}

/* Chat container */
#chatbot{
    margin-top:15px;
    padding:18px;
    background:white;
    max-width:100%;
    max-height:100%;
    overflow-y:auto;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    gap:10px;
}

/* message row */
.message{
    display:flex;
    width:100%;
}

/* user side */
.user{
    justify-content:flex-end;
}

/* bot side */
.bot{
    justify-content:flex-start;
}

/* message bubbles */
.bubble{
    padding:10px 14px;
    border-radius:20px;
    max-width:70%;
    word-wrap:break-word;
}

/* colors */
.user .bubble{
    background:#bfe6b8;
}

.bot .bubble{
    background:#d7d8ea;
}

/* label color */
.bubble b{
    color:#333;
}
</style>

<input type="text" id="userInput" placeholder="Type your message...">
<button id="sendBtn" onclick="sendMessage()">Send</button>

<div id="chatbot"></div>

<script>
async function sendMessage() {

const userInput = document.getElementById("userInput").value;

const response = await fetch("http://127.0.0.1:5000/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:userInput})
});

const data = await response.json();

const formattedBotReply = data.reply.replace(/\*\*/g,"").replace(/\n/g,"<br>");

document.getElementById("chatbot").innerHTML +=
"<div class='message user'><div class='bubble'><b>You:</b> "+userInput+"</div></div>" +
"<div class='message bot'><div class='bubble'><b>Bot:</b> "+formattedBotReply+"</div></div>";

document.getElementById("userInput").value="";
}
</script>
